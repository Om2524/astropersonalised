# Cloudflare Pages configuration for the Next.js frontend.
#
# Build command: pnpm build
# Framework preset: Next.js (via OpenNext adapter)
# Custom domain: forsee.life
#
# Environment variables (set in Cloudflare Pages dashboard):
#   NEXT_PUBLIC_CONVEX_URL = https://<deployment>.convex.cloud
#   CONVEX_AUTH_ADAPTER_SECRET = <from convex auth setup>

name = "forsee-life"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".open-next"

[vars]
# These are placeholder values — real values go in the Cloudflare Pages dashboard
# NEXT_PUBLIC_CONVEX_URL = "https://your-deployment.convex.cloud"
