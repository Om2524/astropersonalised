name: Deploy Sudarshan

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      services:
        description: "Services to deploy (comma-separated: convex,compute,frontend)"
        default: "convex,compute,frontend"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Convex Backend ──────────────────────────────────────────
  convex:
    name: Deploy Convex
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'release' ||
      contains(github.event.inputs.services, 'convex')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Convex CLI
        run: npm install convex@latest

      - name: Deploy functions + schema
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  # ── Shastra Compute (Cloudflare Containers) ─────────────────
  compute:
    name: Deploy Shastra Compute
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'release' ||
      contains(github.event.inputs.services, 'compute')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy to Cloudflare Containers
        working-directory: shastra-compute
        run: npx wrangler@latest deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Frontend (Cloudflare Pages) ─────────────────────────────
  frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [convex]
    if: >
      always() &&
      (needs.convex.result == 'success' || needs.convex.result == 'skipped') &&
      (github.event_name == 'release' || contains(github.event.inputs.services, 'frontend'))
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with OpenNext
        run: pnpm exec opennextjs-cloudflare
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_SHASTRA_STREAM_URL: https://api.forsee.life

      - name: Deploy to Cloudflare Pages
        run: pnpm exec wrangler pages deploy .open-next --project-name=forsee-life
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
