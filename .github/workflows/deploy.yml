name: Deploy Sudarshan

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      services:
        description: "Services to deploy (comma-separated: convex,compute,frontend)"
        default: "convex,compute,frontend"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ── Convex Backend ──────────────────────────────────────────
  convex:
    name: Deploy Convex
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.inputs.services, 'convex')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Deploy functions + schema
        run: |
          ln -s apps/web/node_modules node_modules
          ln -s apps/web/package.json package.json
          npx convex deploy --typecheck disable
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  # ── Shastra Compute (Cloudflare Containers) ─────────────────
  compute:
    name: Deploy Shastra Compute
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.inputs.services, 'compute')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: shastra-compute
        run: npm install

      - name: Diagnose Cloudflare auth and account access
        working-directory: shastra-compute
        run: |
          echo "Verifying Cloudflare API token"
          curl --fail --silent --show-error \
            https://api.cloudflare.com/client/v4/user/tokens/verify \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json"
          echo
          echo "Inspecting Wrangler account access"
          npx wrangler whoami --account "${CLOUDFLARE_ACCOUNT_ID}"
          echo
          echo "Cloudflare Containers are only available on the Workers Paid plan."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Containers
        working-directory: shastra-compute
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Frontend (Cloudflare Pages) ─────────────────────────────
  frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [convex]
    if: >
      always() &&
      (needs.convex.result == 'success' || needs.convex.result == 'skipped') &&
      (github.event_name == 'push' || contains(github.event.inputs.services, 'frontend'))
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Convex types
        run: |
          ln -s apps/web/node_modules node_modules
          ln -s apps/web/package.json package.json
          npx convex codegen --typecheck=disable
        working-directory: .
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Symlink convex into frontend
        run: ln -s ../../convex convex

      - name: Build with OpenNext
        run: pnpm exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_SHASTRA_STREAM_URL: https://api.forsee.life

      - name: Patch node:https out of server bundle
        run: |
          # Next.js font fetcher requires node:https at runtime which doesn't
          # exist on Cloudflare Workers with compat_date < 2025-08-15.
          # Enabling enable_nodejs_http_modules breaks OpenNext's IncomingMessage.
          # Workaround: replace require("node:https") with require("node:http")
          # which IS available as a polyfill. Font fetching won't work but the
          # app won't crash — fonts fall back to system fonts.
          find .open-next -name "fetch-resource.js" -exec sed -i 's|require("node:https")|require("node:http")|g' {} +

      - name: Deploy to Cloudflare
        run: pnpm exec opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Create GitHub Release ───────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [convex, compute, frontend]
    if: always() && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev
        run: |
          PREV=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          echo "tag=${PREV:-$(git rev-list --max-parents=0 HEAD)}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          echo "## Changes" > changelog.md
          git log ${{ steps.prev.outputs.tag }}..${{ github.ref_name }} --pretty=format:"- %s (%h)" >> changelog.md
          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "**Deployed:** Convex (${{ needs.convex.result }}) | Compute (${{ needs.compute.result }}) | Frontend (${{ needs.frontend.result }})" >> changelog.md

      - name: Create release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-file changelog.md
        env:
          GH_TOKEN: ${{ github.token }}
