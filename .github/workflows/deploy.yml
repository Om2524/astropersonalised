name: Deploy Sudarshan

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      services:
        description: "Services to deploy (comma-separated: convex,compute,frontend)"
        default: "convex,compute,frontend"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ── Convex Backend ──────────────────────────────────────────
  convex:
    name: Deploy Convex
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.inputs.services, 'convex')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Deploy functions + schema
        run: |
          ln -s apps/web/node_modules node_modules
          ln -s apps/web/package.json package.json
          npx convex deploy --typecheck disable
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  # ── Shastra Compute (Cloudflare Containers) ─────────────────
  compute:
    name: Deploy Shastra Compute
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.inputs.services, 'compute')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: shastra-compute
        run: npm install

      - name: Deploy to Cloudflare Containers
        working-directory: shastra-compute
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Frontend (Cloudflare Pages) ─────────────────────────────
  frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [convex]
    if: >
      always() &&
      (needs.convex.result == 'success' || needs.convex.result == 'skipped') &&
      (github.event_name == 'push' || contains(github.event.inputs.services, 'frontend'))
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Force convex to use native WebSocket (not ws)
        run: |
          # The convex package's "node" export condition pulls in ws@8.18.0,
          # which uses createRequire("https") at runtime — a dynamic require
          # that bypasses all build-time patches. Cloudflare Workers provide
          # native WebSocket, so ws is unnecessary.
          cp node_modules/convex/dist/esm/browser/index.js node_modules/convex/dist/esm/browser/index-node.js
          cp node_modules/convex/dist/cjs/browser/index.js node_modules/convex/dist/cjs/browser/index-node.js
          echo "Forced convex browser to use native WebSocket"

      - name: Patch OpenNext esbuild (rewrite https→http plugin)
        run: |
          BUNDLE_SERVER=node_modules/@opennextjs/cloudflare/dist/cli/build/bundle-server.js
          # Add an onResolve plugin that rewrites https→http before externalization
          sed -i 's/plugins: \[/plugins: [\n            { name: "rewrite-https", setup(build) { build.onResolve({ filter: \/^(node:)?https$\/ }, (args) => ({ path: args.path.replace("https", "http"), external: true })); } },/' "$BUNDLE_SERVER"
          echo "Patched bundle-server.js — added rewrite-https plugin"

      - name: Generate Convex types
        run: |
          ln -s apps/web/node_modules node_modules
          ln -s apps/web/package.json package.json
          npx convex codegen --typecheck=disable
        working-directory: .
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Symlink convex into frontend
        run: ln -s ../../convex convex

      - name: Build with OpenNext
        run: pnpm exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_SHASTRA_STREAM_URL: https://api.forsee.life
          NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}

      - name: Patch node:https → node:http in build output
        run: |
          find .open-next -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \) \
            -exec sed -i \
              -e 's/require("https")/require("http")/g' \
              -e "s/require('https')/require('http')/g" \
              -e 's/require("node:https")/require("node:http")/g' \
              -e "s/require('node:https')/require('node:http')/g" \
              -e 's/from "https"/from "http"/g' \
              -e "s/from 'https'/from 'http'/g" \
              -e 's/from "node:https"/from "node:http"/g' \
              -e "s/from 'node:https'/from 'node:http'/g" \
              {} +

      - name: Verify no https references remain
        run: |
          echo "=== Checking for remaining https requires in .open-next/ ==="
          FOUND=$(grep -r 'require("https")\|require('\''https'\'')\|require("node:https")\|require('\''node:https'\'')\|from "https"\|from '\''https'\''\|from "node:https"\|from '\''node:https'\''' .open-next/ --include='*.js' --include='*.mjs' --include='*.cjs' -l || true)
          if [ -n "$FOUND" ]; then
            echo "WARNING: Files still containing https references:"
            echo "$FOUND"
            grep -r 'require("https")\|require('\''https'\'')\|require("node:https")\|require('\''node:https'\'')' .open-next/ --include='*.js' --include='*.mjs' --include='*.cjs' -c || true
          else
            echo "OK: No https requires found in build output"
          fi

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Create GitHub Release ───────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [convex, compute, frontend]
    if: always() && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev
        run: |
          PREV=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          echo "tag=${PREV:-$(git rev-list --max-parents=0 HEAD)}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          echo "## Changes" > changelog.md
          git log ${{ steps.prev.outputs.tag }}..${{ github.ref_name }} --pretty=format:"- %s (%h)" >> changelog.md
          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "**Deployed:** Convex (${{ needs.convex.result }}) | Compute (${{ needs.compute.result }}) | Frontend (${{ needs.frontend.result }})" >> changelog.md

      - name: Create release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-file changelog.md
        env:
          GH_TOKEN: ${{ github.token }}
