name: Deploy Sudarshan

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      services:
        description: "Services to deploy (comma-separated: convex,compute,frontend)"
        default: "convex,compute,frontend"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ── Convex Backend ──────────────────────────────────────────
  convex:
    name: Deploy Convex
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.inputs.services, 'convex')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Deploy functions + schema
        run: |
          ln -s apps/web/node_modules node_modules
          ln -s apps/web/package.json package.json
          npx convex deploy --typecheck disable
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  # ── Shastra Compute (Cloudflare Containers) ─────────────────
  compute:
    name: Deploy Shastra Compute
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.inputs.services, 'compute')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: shastra-compute
        run: npm install

      - name: Deploy to Cloudflare Containers
        working-directory: shastra-compute
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_COMPUTE_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Frontend (Cloudflare Pages) ─────────────────────────────
  frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [convex]
    if: >
      always() &&
      (needs.convex.result == 'success' || needs.convex.result == 'skipped') &&
      (github.event_name == 'push' || contains(github.event.inputs.services, 'frontend'))
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Convex types
        run: |
          ln -s apps/web/node_modules node_modules
          ln -s apps/web/package.json package.json
          npx convex codegen --typecheck=disable
        working-directory: .
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Symlink convex into frontend
        run: ln -s ../../convex convex

      - name: Build with OpenNext
        run: pnpm exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_SHASTRA_STREAM_URL: https://api.forsee.life

      - name: Bundle (dry-run to capture esbuild output)
        run: npx wrangler deploy --dry-run --outdir=.worker-dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Patch dynamic https requires
        run: |
          echo "=== Before patch ==="
          grep -c '("https")' .worker-dist/worker.js || true
          # Replace webpack runtime require("https") with require("http").
          # \b + single letter + ("https") targets only webpack-style calls
          # like p("https"), NOT protocol checks like includes("https").
          sed -i 's/\b\([a-zA-Z]\)("https")/\1("http")/g' .worker-dist/worker.js
          echo "=== After patch ==="
          grep -c '("https")' .worker-dist/worker.js || true

      - name: Deploy patched bundle
        run: |
          # Hide open-next.config.ts so wrangler doesn't re-trigger OpenNext
          mv open-next.config.ts open-next.config.ts.bak
          npx wrangler deploy --no-bundle .worker-dist/worker.js
          mv open-next.config.ts.bak open-next.config.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Create GitHub Release ───────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [convex, compute, frontend]
    if: always() && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev
        run: |
          PREV=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          echo "tag=${PREV:-$(git rev-list --max-parents=0 HEAD)}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          echo "## Changes" > changelog.md
          git log ${{ steps.prev.outputs.tag }}..${{ github.ref_name }} --pretty=format:"- %s (%h)" >> changelog.md
          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "**Deployed:** Convex (${{ needs.convex.result }}) | Compute (${{ needs.compute.result }}) | Frontend (${{ needs.frontend.result }})" >> changelog.md

      - name: Create release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-file changelog.md
        env:
          GH_TOKEN: ${{ github.token }}
